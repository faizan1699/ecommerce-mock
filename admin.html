<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — MP Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container">
    <h1 class="page-title">Admin Dashboard</h1>

    <div class="layout-2">
      <div class="summary" style="position:static">
        <h3 id="formTitle">Add New Product</h3>
        <form id="productForm">
          <div class="form-group">
            <label for="title">Product Title</label>
            <input type="text" id="title" required>
          </div>
          <div class="form-group">
            <label for="price">Price (Rs)</label>
            <input type="number" id="price" min="0" required>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" placeholder="Electronics / Fashion..." required>
          </div>
          <div class="form-group">
            <label for="stock">Stock</label>
            <input type="number" id="stock" min="0" value="10">
          </div>
          <div class="form-group">
            <label for="image">Image URL (optional)</label>
            <input type="text" id="image" placeholder="https://...">
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-block" id="submitBtn">Add Product</button>
          <button type="button" class="btn btn-outline btn-block" id="cancelEdit" style="margin-top:10px;display:none">
            Cancel Edit
          </button>
        </form>
      </div>

      <div>
        <h3 style="margin-bottom:12px">Products</h3>
        <table class="table">
          <thead>
            <tr>
              <th>Image</th><th>Title</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="productRows"></tbody>
        </table>
      </div>
    </div>

    <h3 style="margin:30px 0 12px">Customer Orders</h3>
    <table class="table">
      <thead>
        <tr>
          <th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Date</th>
        </tr>
      </thead>
      <tbody id="orderRows"></tbody>
    </table>
  </div>

  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
